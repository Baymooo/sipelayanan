version: '3.8'

services:
  db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: sipelayanan
      MYSQL_USER: admin
      MYSQL_PASSWORD: password123
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    ports:
      - "3000:3000"
    environment:
      DB_HOST: db
      DB_NAME: sipelayanan
      DB_USER: admin
      DB_PASSWORD: password123
      DB_PORT: 3306
      S3_BUCKET_NAME: sipelayanan-files-test
      AWS_REGION: ap-southeast-2
      CLOUDFRONT_URL: https://XXXX.cloudfront.net
      JWT_SECRET: secret_lokal_dev
      PORT: 3000
      NODE_ENV: development
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./frontend
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  db_data:
